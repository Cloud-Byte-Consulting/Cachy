name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} CLI
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact: cachy_windows_amd64.exe
            archive: cachy_windows_amd64.zip
          - goos: windows
            goarch: arm64
            artifact: cachy_windows_arm64.exe
            archive: cachy_windows_arm64.zip
          - goos: darwin
            goarch: amd64
            artifact: cachy_darwin_amd64
            archive: cachy_darwin_amd64.tar.gz
          - goos: darwin
            goarch: arm64
            artifact: cachy_darwin_arm64
            archive: cachy_darwin_arm64.tar.gz
          - goos: linux
            goarch: amd64
            artifact: cachy_linux_amd64
            archive: cachy_linux_amd64.tar.gz
          - goos: linux
            goarch: arm64
            artifact: cachy_linux_arm64
            archive: cachy_linux_arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -o "dist/${{ matrix.artifact }}" ./cmd/cachy

      - name: Package CLI archive
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/cachy-release package \
            --input "dist/${{ matrix.artifact }}" \
            --goos "${{ matrix.goos }}" \
            --goarch "${{ matrix.goarch }}" \
            --out dist

      - name: Generate CLI SBOM
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/cachy-release sbom \
            --kind binary \
            --artifact "dist/${{ matrix.archive }}" \
            --version "${GITHUB_REF_NAME:-manual}" \
            --out "dist/${{ matrix.archive }}.sbom.json"

      - name: Upload CLI archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
            dist/${{ matrix.archive }}.sbom.json

  build-docker:
    name: Build multi-arch Docker image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker OCI archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: cachy:release-candidate
          outputs: type=oci,dest=dist/cachy_linux_multiarch.oci.tar

      - name: Generate Docker SBOM
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/cachy-release sbom \
            --kind docker \
            --artifact dist/cachy_linux_multiarch.oci.tar \
            --version "${GITHUB_REF_NAME:-manual}" \
            --out dist/cachy_linux_multiarch.oci.tar.sbom.json

      - name: Upload Docker OCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cachy_linux_multiarch.oci.tar
          path: |
            dist/cachy_linux_multiarch.oci.tar
            dist/cachy_linux_multiarch.oci.tar.sbom.json

  release-evidence:
    name: Generate source SBOM and release notes
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate source evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          go run ./cmd/cachy-release sbom \
            --kind source \
            --artifact . \
            --version "${GITHUB_REF_NAME:-manual}" \
            --out dist/cachy_source.sbom.json
          go run ./cmd/cachy-release notes \
            --version "${GITHUB_REF_NAME:-manual}" \
            --out dist/RELEASE_NOTES.md

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: cachy_release_evidence
          path: |
            dist/cachy_source.sbom.json
            dist/RELEASE_NOTES.md
