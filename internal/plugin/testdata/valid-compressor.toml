name = "stacktrace-compressor"
version = "0.1.0"
api_version = "v1"
description = "Compresses repeated stack frames and dependency noise."

[capabilities]
compress = ["log", "text"]
classify = []
redact = []

[limits]
timeout_ms = 50
memory_mb = 32
max_input_bytes = 262144
max_output_bytes = 131072
